<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lil Cal</title>
  </head>
  <body>
    <header>
      <h1>LIL CAL</h1>
      <p>simple calculator to help you get through simple math</p>
    </header>
    <main>
      <div class="cal-container">
        <div class="output-div"></div>
        <div class="symbol"><span><-</span></div>
        <div class="clear"><span>AC</span></div>
        <div class="symbol"><span>%</span></div>
        <div class="symbol"><span>➗</span></div>
        <div class="number"><span>7</span></div>
        <div class="number"><span>8</span></div>
        <div class="number"><span>9</span></div>
        <div class="symbol"><span>X</span></div>
        <div class="number"><span>4</span></div>
        <div class="number"><span>5</span></div>
        <div class="number"><span>6</span></div>
        <div class="symbol"><span>-</span></div>
        <div class="number"><span>1</span></div>
        <div class="number"><span>2</span></div>
        <div class="number"><span>3</span></div>
        <div class="symbol"><span>+</span></div>
        <div class="symbol"><span>+/-</span></div>
        <div class="number"><span>0</span></div>
        <div class="symbol"><span>.</span></div>
        <div class="symbol"><span>=</span></div>
      </div>
    </main>
  </body>
</html>
